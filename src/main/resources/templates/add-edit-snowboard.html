<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/general :: header}">
    <title th:text="${snowboard.id == null} ? 'Nieuw Snowboard' : 'Snowboard Bewerken'"></title>
</head>
<body>

<nav th:replace="~{fragments/general :: navbar}"></nav>

<div class="container mt-5 mb-5">
    <div class="card shadow col-md-8 mx-auto border-0">
        <div class="card-header bg-dark text-white py-3">
            <h4 class="mb-0" th:text="${snowboard.id == null} ? 'Nieuw Snowboard Toevoegen' : 'Snowboard Bewerken'">
                Snowboard Formulier</h4>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/snowboard/save}" th:object="${snowboard}" method="post" enctype="multipart/form-data">

                <!-- Verborgen velden -->
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{imageUrl}">

                <div class="row">
                    <!-- Merk -->
                    <div class="col-md-6 mb-3">
                        <label for="merk" class="form-label fw-bold">Merk</label>
                        <input type="text" th:field="*{merk}" class="form-control"
                               th:classappend="${#fields.hasErrors('merk')} ? 'is-invalid' : ''" id="merk" required>
                        <div th:if="${#fields.hasErrors('merk')}" th:errors="*{merk}" class="invalid-feedback"></div>
                    </div>

                    <!-- Model -->
                    <div class="col-md-6 mb-3">
                        <label for="model" class="form-label fw-bold">Model</label>
                        <input type="text" th:field="*{model}" class="form-control"
                               th:classappend="${#fields.hasErrors('model')} ? 'is-invalid' : ''" id="model" required>
                        <div th:if="${#fields.hasErrors('model')}" th:errors="*{model}" class="invalid-feedback"></div>
                    </div>
                </div>

                <div class="row">
                    <!-- Dagprijs -->
                    <div class="col-md-6 mb-3">
                        <label for="dailyPrice" class="form-label fw-bold">Prijs per dag (€)</label>
                        <div class="input-group">
                            <span class="input-group-text">€</span>
                            <input type="number" step="0.01"
                                   th:field="*{dailyPrice}" class="form-control" id="dailyPrice" required>
                        </div>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Type(s)</label>
                        <div class="d-flex flex-wrap gap-3 border rounded p-2 bg-light">
                            <div th:each="t : ${alleTypes}" class="form-check">
                                <input class="form-check-input" type="checkbox" th:field="*{types}"
                                       th:value="${t.id}" th:id="'sbtype' + ${t.id}">
                                <label class="form-check-label" th:for="'sbtype' + ${t.id}" th:text="${t.naam}"></label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Omschrijving -->
                <div class="mb-3">
                    <label for="omschrijving" class="form-label fw-bold">Omschrijving</label>
                    <textarea th:field="*{omschrijving}" class="form-control" id="omschrijving" rows="3"
                              placeholder="Vertel iets over dit snowboard..."></textarea>
                </div>

                <!-- Afbeelding -->
                <div class="mb-4 p-3 border rounded bg-light">
                    <label for="imageFile" class="form-label fw-bold">Afbeelding</label>
                    <input type="file" name="imageFile" id="imageFile" class="form-control" accept="image/*">
                    <div class="form-text">
                        Kies een bestand om de huidige foto te vervangen of een nieuwe toe te voegen.</div>

                    <div th:if="*{imageUrl}" class="mt-3 text-center">
                        <p class="small text-muted mb-1">Huidige foto:</p>
                        <img th:src="*{imageUrl}" class="img-thumbnail" style="height: 120px; object-fit: cover;">
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mt-4">
                    <a th:href="@{/snowboard/all}" class="btn btn-outline-secondary">Annuleren</a>
                    <button type="submit" class="btn btn-dark px-5 shadow-sm">Snowboard Opslaan</button>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/general :: footer}"></footer>
</body>
</html>
