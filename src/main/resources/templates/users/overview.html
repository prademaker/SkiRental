<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/general :: header}">
    <title>Gebruikersbeheer</title>
</head>
<body>

<nav th:replace="~{fragments/general :: navbar}"></nav>

<div class="container mt-4">
    <!-- Header met Titel en Knop naast elkaar -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Gebruikersbeheer</h1>
        <a th:href="@{/users/add}" class="btn btn-primary">
            Nieuwe gebruiker toevoegen
        </a>
    </div>

    <!-- Meldingen -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- De Tabel -->
    <div class="card shadow-sm">
        <div class="card-body p-0"> <!-- p-0 zorgt dat de tabel de hele kaart vult -->
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th class="ps-4">Gebruikersnaam</th>
                    <th>Rol</th>
                    <th class="text-end pe-4">Acties</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td class="ps-4 align-middle">
                        <span class="fw-bold" th:text="${user.username}">admin</span>
                    </td>
                    <td class="align-middle">
                        <!-- Badge op basis van rol -->
                        <span th:if="${user.role == 'ADMIN'}" class="badge bg-danger">ADMIN</span>
                        <span th:if="${user.role == 'USER'}" class="badge bg-info text-dark">USER</span>
                        <span th:if="${user.role != 'ADMIN' && user.role != 'USER'}" class="badge bg-secondary" th:text="${user.role}">ROL</span>
                    </td>
                    <td class="text-end pe-4 align-middle">
                        <!-- Verwijder knop met bevestiging -->
                        <form th:action="@{/users/delete/{id}(id=${user.id})}" method="post"
                              onsubmit="return confirm('Weet je zeker dat je deze gebruiker wilt verwijderen?');"
                              style="display: inline;">
                            <button type="submit" class="btn btn-outline-danger btn-sm">
                                Verwijderen
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${users.isEmpty()}">
                    <td colspan="3" class="text-center py-4 text-muted">
                        Geen gebruikers gevonden in het systeem.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-3 text-muted small">
        <p>Totaal aantal gebruikers: <span th:text="${users.size()}">0</span></p>
    </div>
</div>

<footer th:replace="~{fragments/general :: footer}"></footer>

</body>
</html>
