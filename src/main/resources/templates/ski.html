<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${paginaTitel}">Ski overzicht</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>
    <div th:if="${successMessage}"
         class="alert alert-success">
        <span th:text="${successMessage}">Opgeslagen!</span>
    </div>
    <h1 th:text="${paginaTitel}">Ski overzicht</h1>
    <p th:text="${verhuurNaam}">Naam ski verhuur en locatie</p>

    <form method="get" action="/ski">
        <input type="text" name="query"
               th:value="${query}"
               placeholder="Zoek op merk..."/>
        <button type="submit">Zoeken</button>
    </form>
    <br/>
    <table>
        <thead>
        <tr>
            <th>Merk</th>
            <th>Model</th>
            <th>Type</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="ski : ${skis}">
            <td th:text="${ski.merk}">merk</td>
            <td th:text="${ski.model}">model</td>
            <td th:text="${ski.type}">type</td>
            <td>
                <a th:href="@{/ski/delete/{merk}(merk=${ski.merk})}">
                    Verwijderen
                </a>
                <a th:href="@{/ski/edit/{merk}(merk=${ski.merk})}">
                    Bewerken
                </a>
            </td>
        </tr>
        </tbody>
    </table>
        <p><a th:href="@{/ski/add}">Nieuwe ski toevoegen</a></p>
</body>
</html>
