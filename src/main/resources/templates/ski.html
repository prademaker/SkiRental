<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/general :: header}">
    <title th:text="${paginaTitel}">Ski Overzicht</title>
</head>
<body>

<nav th:replace="~{fragments/general :: navbar}"></nav>

<div class="container mt-4">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Ski Overzicht</h1>
        <button type="button" class="btn btn-success shadow-sm" data-bs-toggle="modal" data-bs-target="#addSkiModal">
            <i class="bi bi-plus-lg"></i> Nieuwe ski toevoegen
        </button>
    </div>

    <form th:action="@{/ski/all}" method="get" class="row g-3 mb-4">
        <div class="col-auto">
            <input type="text" name="query" th:value="${query}" class="form-control" placeholder="Zoek op merk...">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary px-4">Zoek</button>
            <a th:href="@{/ski/all}" class="btn btn-outline-secondary">Wissen</a>
        </div>
    </form>

    <!-- Tabel -->
    <div class="card shadow-sm border-0">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
            <tr>
                <th class="ps-4">Merk</th>
                <th>Model</th>
                <th>Types</th>
                <th class="text-center">Beschikbaar</th>
                <th class="text-end pe-4">Acties</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="ski : ${skis}">
                <td class="ps-4 fw-bold" th:text="${ski.merk}">merk</td>
                <td th:text="${ski.model}">model</td>
                <td>
                    <span th:each="type, iterStat : ${ski.types}"
                          class="badge bg-secondary me-1" th:text="${type.naam}"></span>
                </td>
                <td class="text-center">
                    <span class="badge rounded-pill bg-success" th:text="${ski.getAantalBeschikbaar()}">0</span>
                </td>
                <td class="text-end pe-4">
                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/ski/{id}(id=${ski.id})}" class="btn btn-sm btn-info text-white">Details</a>
                        <a th:href="@{/ski/edit/{id}(id=${ski.id})}" class="btn btn-sm btn-warning">Bewerken</a>
                        <form th:action="@{/ski/delete/{id}(id=${ski.id})}" method="post"
                              onsubmit="return confirm('Weet je het zeker?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Verwijderen</button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${skis.isEmpty()}">
                <td colspan="5" class="text-center py-5 text-muted">Geen ski's gevonden die aan je zoekopdracht voldoen.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-4">
        <a href="/" class="btn btn-link ps-0">Terug naar de startpagina</a>
    </div>
</div>

<!-- MODAL VOOR NIEUWE SKI -->
<div class="modal fade" id="addSkiModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Nieuwe Ski Toevoegen</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/ski/save}" th:object="${ski}" method="post" enctype="multipart/form-data">
                <div class="modal-body p-4">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Merk</label>
                            <input type="text" th:field="*{merk}" class="form-control"
                                   th:classappend="${#fields.hasErrors('merk')} ? 'is-invalid' : ''" required>
                            <div th:errors="*{merk}" class="invalid-feedback"></div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Model</label>
                            <input type="text" th:field="*{model}" class="form-control"
                                   th:classappend="${#fields.hasErrors('model')} ? 'is-invalid' : ''" required>
                            <div th:errors="*{model}" class="invalid-feedback"></div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Prijs per dag (€)</label>
                            <input type="number" step="0.01" th:field="*{dailyPrice}" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Types</label>
                            <div class="d-flex flex-wrap gap-2 border rounded p-2 bg-light">
                                <div th:each="t : ${alleTypes}" class="form-check">
                                    <input class="form-check-input" type="checkbox" th:field="*{types}"
                                           th:value="${t.id}" th:id="'type' + ${t.id}">
                                    <label class="form-check-label" th:for="'type' + ${t.id}" th:text="${t.naam}"></label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Omschrijving</label>
                        <textarea th:field="*{omschrijving}" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Afbeelding</label>
                        <input type="file" name="imageFile" class="form-control" accept="image/*">
                    </div>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuleren</button>
                    <button type="submit" class="btn btn-primary px-4">Ski Opslaan</button>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/general :: footer}"></footer>

<script th:if="${#fields.hasErrors('${ski.*}')}">
    document.addEventListener("DOMContentLoaded", function() {
        var addSkiModal = new bootstrap.Modal(document.getElementById('addSkiModal'));
        addSkiModal.show();
    });
</script>

</body>
</html>
