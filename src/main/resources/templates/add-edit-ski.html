<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/general :: header}">
    <title th:text="${ski.id == null} ? 'Nieuwe Ski' : 'Ski Bewerken'"></title>
</head>
<body>

<nav th:replace="~{fragments/general :: navbar}"></nav>

<div class="container mt-5">
    <div class="card shadow col-md-8 mx-auto">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0" th:text="${ski.id == null} ? 'Nieuwe Ski Toevoegen' : 'Ski Bewerken'">Ski Formulier</h4>
        </div>
        <div class="card-body">
            <!-- BELANGRIJK: enctype="multipart/form-data" is verplicht voor uploads -->
            <form th:action="@{/ski/save}" th:object="${ski}" method="post" enctype="multipart/form-data">

                <!-- Verborgen veld voor ID (nodig voor bewerken) -->
                <input type="hidden" th:field="*{id}">

                <!-- Verborgen veld voor huidige imageUrl (zodat deze bewaard blijft als je geen nieuwe foto kiest) -->
                <input type="hidden" th:field="*{imageUrl}">

                <div class="row">
                    <!-- Merk -->
                    <div class="col-md-6 mb-3">
                        <label for="merk" class="form-label fw-bold">Merk</label>
                        <input type="text" th:field="*{merk}" class="form-control" id="merk" required>
                        <div th:if="${#fields.hasErrors('merk')}" th:errors="*{merk}" class="text-danger small"></div>
                    </div>

                    <!-- Model -->
                    <div class="col-md-6 mb-3">
                        <label for="model" class="form-label fw-bold">Model</label>
                        <input type="text" th:field="*{model}" class="form-control" id="model" required>
                        <div th:if="${#fields.hasErrors('model')}" th:errors="*{model}" class="text-danger small"></div>
                    </div>
                </div>

                <div class="row">
                    <!-- Dagprijs -->
                    <div class="col-md-6 mb-3">
                        <label for="dailyPrice" class="form-label fw-bold">Prijs per dag (€)</label>
                        <input type="number" step="0.01" th:field="*{dailyPrice}" class="form-control" id="dailyPrice" required>
                    </div>

                    <!-- Types (Checkboxes) -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Type(s)</label>
                        <div class="d-flex flex-wrap gap-2">
                            <div th:each="t : ${alleTypes}" class="form-check">
                                <input class="form-check-input" type="checkbox" th:field="*{types}" th:value="${t.id}" th:id="'type' + ${t.id}">
                                <label class="form-check-label" th:for="'type' + ${t.id}" th:text="${t.naam}"></label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Omschrijving -->
                <div class="mb-3">
                    <label for="omschrijving" class="form-label fw-bold">Omschrijving</label>
                    <textarea th:field="*{omschrijving}" class="form-control" id="omschrijving" rows="3" placeholder="Vertel iets over deze ski's..."></textarea>
                </div>

                <!-- BESTANDSUPLOAD -->
                <div class="mb-4">
                    <label for="imageFile" class="form-label fw-bold">Afbeelding Uploaden</label>
                    <input type="file" name="imageFile" id="imageFile" class="form-control" accept="image/*">
                    <div class="form-text">Laat leeg om de huidige afbeelding te behouden.</div>

                    <!-- Toon huidige afbeelding als preview bij bewerken -->
                    <div th:if="*{imageUrl}" class="mt-2 text-center">
                        <p class="small text-muted">Huidige foto:</p>
                        <img th:src="*{imageUrl}" class="img-thumbnail" style="height: 100px;">
                    </div>
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/ski/all}" class="btn btn-outline-secondary">Annuleren</a>
                    <button type="submit" class="btn btn-primary px-5">Ski Opslaan</button>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/general :: footer}"></footer>
</body>
</html>
