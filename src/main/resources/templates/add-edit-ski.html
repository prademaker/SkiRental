<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ski toevoegen — Rent-A-Ski</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<h1>Ski toevoegen</h1>
<form th:action="@{/ski/save}" method="post"
      th:object="${ski}">
    <div>
        <label for="merk">Merk</label>
        <input type="text" id="merk" th:field="*{merk}"/>
        <span th:if="${#fields.hasErrors('merk')}"
              th:errors="*{merk}"
              class="error">
        </span>
    </div> <div>
    <label for="model">Model</label>
    <input type="text" id="model" th:field="*{model}"/>
    <span th:if="${#fields.hasErrors('model')}"
          th:errors="*{model}"
          class="error">
        </span>
</div>
    <div>
        <label for="type">Type</label>
        <input type="text" id="type"
               th:field="*{type}"/>
        <span th:if="${#fields.hasErrors('type')}"
              th:errors="*{type}"
              class="error">
        </span>
    </div>
    <button type="submit">Opslaan</button>
</form>
<p><a th:href="@{/ski}">Terug naar het overzicht</a></p>
</body>
</html>
