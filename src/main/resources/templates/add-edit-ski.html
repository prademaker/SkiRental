<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:replace="~{fragments/general :: header}"></title>
</head>
<body>
<nav th:replace="~{fragments/general :: navbar}"></nav>

<div class="container mt-4">

<div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

<div class="d-flex align-items-center gap-3">
    <h1>Ski toevoegen</h1>
</div>

<form th:action="@{/ski/save}" method="post" th:object="${ski}" class="mt-3">
    <div class="mb-3">
        <label for="merk" class="form-label">Merk</label>
        <input type="text" id="merk" th:field="*{merk}" class="form-control w-auto"/>
        <span th:if="${#fields.hasErrors('merk')}" th:errors="*{merk}" class="text-danger"></span>
    </div>

    <div class="mb-3">
        <label for="model" class="form-label">Model</label>
        <input type="text" id="model" th:field="*{model}" class="form-control w-auto"/>
        <span th:if="${#fields.hasErrors('model')}" th:errors="*{model}" class="text-danger"></span>
    </div>

    <div class="mb-3">
        <label for="imageUrl" class="form-label">Afbeelding URL</label>
        <input type="text" th:field="*{imageUrl}" class="form-control"
               id="imageUrl" placeholder="https://voorbeeld.nl/ski.jpg">
    </div>

    <div class="mb-3">
        <label class="form-label">Types</label>
        <div th:each="type : ${alleTypes}" class="form-check">
            <input type="checkbox" class="form-check-input"
                   th:value="${type.id}"
                   name="types"
                   th:checked="${ski.types.contains(type)}"/>
            <label class="form-check-label" th:text="${type.naam}">type</label>
        </div>
    </div>
    <div class="mb-3">
        <label for="dailyPrice" class="form-label fw-bold">Prijs per dag (€)</label>
        <input type="number" step="0.01" id="dailyPrice" class="form-control"
               th:field="*{dailyPrice}" required placeholder="0.00">
        <div class="form-text">Voer de huurprijs per dag in.</div>
    </div>
    <div class="mb-3">
        <label for="omschrijving" class="form-label">Omschrijving</label>
        <textarea th:field="*{omschrijving}" class="form-control" id="omschrijving" rows="4"></textarea>
    </div>

    <button type="submit" class="btn btn-success">Opslaan</button>
</form>

<a th:href="@{/ski/all}" class="btn btn-link mt-3">Terug naar overzicht</a>
<footer th:replace="~{fragments/general :: footer}"></footer>
</div>
</body>
</html>
