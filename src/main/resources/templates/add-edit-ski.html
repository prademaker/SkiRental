<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ski toevoegen — Rent-A-Ski</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<h1>Ski toevoegen</h1>
<form th:action="@{/ski/save}" method="post"
      th:object="${ski}">
    <div>
        <label for="merk">Merk</label>
        <input type="text" id="merk" th:field="*{merk}"/>
        <span th:if="${#fields.hasErrors('merk')}"
              th:errors="*{merk}"
              class="error">
        </span>
    </div> <div>
    <label for="model">Model</label>
    <input type="text" id="model" th:field="*{model}"/>
    <span th:if="${#fields.hasErrors('model')}"
          th:errors="*{model}"
          class="error">
        </span>
    <span th:if="${#fields.hasErrors('model')}" th:errors="*{model}" class="text-danger"></span>

</div>
    <div class="mb-3">
        <label class="form-label">Types</label><br/>
        <div th:each="type : ${alleTypes}" class="form-check">
            <input type="checkbox" class="form-check-input"
                   th:value="${type.id}"
                   name="types"
                   th:checked="${ski.types.contains(type)}"/>
            <label class="form-check-label" th:text="${type.naam}">type</label>
        </div>
    </div>
    <button type="submit">Opslaan</button>
</form>
<p><a th:href="@{/ski/all}">Terug naar het overzicht</a></p>
</body>
</html>
