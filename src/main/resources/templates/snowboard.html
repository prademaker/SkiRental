<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/general :: header}">
    <title th:text="${paginaTitel}">Snowboard Overzicht</title>
</head>
<body>

<nav th:replace="~{fragments/general :: navbar}"></nav>

<div class="container mt-4">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Snowboard Overzicht</h1>
        <button type="button" class="btn btn-dark shadow-sm"
                data-bs-toggle="modal" data-bs-target="#addSnowboardModal" sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-plus-lg"></i> Nieuw snowboard toevoegen
        </button>
    </div>

    <form th:action="@{/snowboard/all}" method="get" class="row g-3 mb-4">
        <div class="col-auto">
            <input type="text" name="query" th:value="${query}" class="form-control" placeholder="Zoek op merk...">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary px-4">Zoek</button>
            <a th:href="@{/snowboard/all}" class="btn btn-outline-secondary">Wissen</a>
        </div>
    </form>

    <div class="card shadow-sm border-0">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
            <tr>
                <th class="ps-4">Merk</th>
                <th>Model</th>
                <th>Types</th>
                <th>Prijs p/d</th>
                <th class="text-center">Beschikbaar</th>
                <th class="text-end pe-4">Acties</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="sb : ${snowboards}">
                <td class="ps-4 fw-bold" th:text="${sb.merk}">merk</td>
                <td th:text="${sb.model}">model</td>
                <td>
                    <span th:each="type, iterStat : ${sb.types}"
                          class="badge bg-secondary me-1" th:text="${type.naam}"></span>
                </td>
                <td th:text="'€ ' + ${#numbers.formatDecimal(sb.dailyPrice, 1, 2, 'COMMA')}">0.00</td>
                <td class="text-center">
                    <span class="badge rounded-pill bg-success"
                          th:text="${sb.getAantalBeschikbaar()}">0</span>
                </td>
                <td class="text-end pe-4">
                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/snowboard/{id}(id=${sb.id})}"
                           class="btn btn-sm btn-info text-white">Details</a>

                        <button type="button" class="btn btn-sm btn-warning" sec:authorize="hasRole('ADMIN')"
                                data-bs-toggle="modal" data-bs-target="#editSnowboardModal"
                                th:data-id="${sb.id}"
                                th:data-merk="${sb.merk}"
                                th:data-model="${sb.model}"
                                th:data-price="${sb.dailyPrice}"
                                th:data-description="${sb.omschrijving}"
                                th:data-types="${#strings.listJoin(sb.types.![id], ',')}">
                            Bewerken
                        </button>

                        <form th:action="@{/snowboard/delete/{id}(id=${sb.id})}" method="post"
                              onsubmit="return confirm('Weet je het zeker?');" sec:authorize="hasRole('ADMIN')">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Verwijderen</button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${snowboards.isEmpty()}">
                <td colspan="6" class="text-center py-5 text-muted">Geen snowboards gevonden.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="addSnowboardModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title">Nieuw Snowboard Toevoegen</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/snowboard/save}" th:object="${snowboard}" method="post" enctype="multipart/form-data">
                <div class="modal-body p-4">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Merk</label>
                            <input type="text" th:field="*{merk}" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Model</label>
                            <input type="text" th:field="*{model}" class="form-control" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Prijs per dag (€)</label>
                            <input type="number" step="0.01" th:field="*{dailyPrice}" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Types</label>
                            <div class="d-flex flex-wrap gap-2 border rounded p-2 bg-light">
                                <div th:each="t : ${alleTypes}" class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                           th:field="*{types}" th:value="${t.id}" th:id="'sb-type-add-' + ${t.id}">
                                    <label class="form-check-label"
                                           th:for="'sb-type-add-' + ${t.id}" th:text="${t.naam}"></label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Omschrijving</label>
                        <textarea th:field="*{omschrijving}" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Afbeelding</label>
                        <input type="file" name="imageFile" class="form-control" accept="image/*">
                    </div>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuleren</button>
                    <button type="submit" class="btn btn-dark px-4">Snowboard Toevoegen</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="editSnowboardModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title">Snowboard Bewerken</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/snowboard/save}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="id" id="sb-edit-id">
                <div class="modal-body p-4">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Merk</label>
                            <input type="text" name="merk" id="sb-edit-merk" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Model</label>
                            <input type="text" name="model" id="sb-edit-model" class="form-control" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Prijs per dag (€)</label>
                            <input type="number" step="0.01"
                                   name="dailyPrice" id="sb-edit-price" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Types</label>
                            <div class="d-flex flex-wrap gap-2 border rounded p-2 bg-light">
                                <div th:each="t : ${alleTypes}" class="form-check">
                                    <input class="form-check-input sb-edit-type-checkbox" type="checkbox" name="types"
                                           th:value="${t.id}" th:id="'sb-type-edit-' + ${t.id}">
                                    <label class="form-check-label"
                                           th:for="'sb-type-edit-' + ${t.id}" th:text="${t.naam}"></label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Omschrijving</label>
                        <textarea name="omschrijving" id="sb-edit-omschrijving" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nieuwe Afbeelding (optioneel)</label>
                        <input type="file" name="imageFile" class="form-control" accept="image/*">
                    </div>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuleren</button>
                    <button type="submit" class="btn btn-warning px-4">Wijzigingen Opslaan</button>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/general :: footer}"></footer>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const editSbModal = document.getElementById('editSnowboardModal');
        if (editSbModal) {
            editSbModal.addEventListener('show.bs.modal', function (event) {
                const button = event.relatedTarget;

                const id = button.getAttribute('data-id');
                const merk = button.getAttribute('data-merk');
                const model = button.getAttribute('data-model');
                const price = button.getAttribute('data-price');
                const description = button.getAttribute('data-description');
                const types = button.getAttribute('data-types');

                editSbModal.querySelector('#sb-edit-id').value = id;
                editSbModal.querySelector('#sb-edit-merk').value = merk;
                editSbModal.querySelector('#sb-edit-model').value = model;
                editSbModal.querySelector('#sb-edit-price').value = price;
                editSbModal.querySelector('#sb-edit-omschrijving').value = description;

                const checkboxes = editSbModal.querySelectorAll('.sb-edit-type-checkbox');
                checkboxes.forEach(cb => cb.checked = false);

                if (types) {
                    const activeTypes = types.split(',');
                    activeTypes.forEach(typeId => {
                        const cb = editSbModal.querySelector('#sb-type-edit-' + typeId.trim());
                        if (cb) cb.checked = true;
                    });
                }
            });
        }
    });
</script>

</body>
</html>
