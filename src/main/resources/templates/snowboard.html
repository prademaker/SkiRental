<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/general :: header}">
    <title th:text="${paginaTitel}">Snowboard overzicht</title>
</head>
<body>

<nav th:replace="~{fragments/general :: navbar}"></nav>

<div class="container mt-4">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <h1 th:text="${paginaTitel}">Snowboard overzicht</h1>

    <form th:action="@{/snowboard/all}" method="get" class="row g-3 mb-4">
        <div class="col-auto">
            <input type="text" name="query" th:value="${query}"
                   class="form-control" placeholder="Zoek op merk...">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Zoek</button>
            <a th:href="@{/snowboard/all}" class="btn btn-outline-secondary">Wissen</a>
        </div>
    </form>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Merk</th>
            <th>Model</th>
            <th>Types</th>
            <th>Beschikbaar</th>
            <th>Uitgeleend</th>
            <th>Totaal</th>
            <th>Acties</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="snowboard : ${snowboards}">
            <td th:text="${snowboard.merk}">merk</td>
            <td th:text="${snowboard.model}">model</td>
            <td>
                <span th:each="type, iterStat : ${snowboard.types}">
                    <span th:text="${type.naam}"></span><span th:if="!${iterStat.last}">, </span>
                </span>
            </td>
            <td th:text="${snowboard.aantalBeschikbaar}">0</td>
            <td th:text="${snowboard.aantalUitgeleend}">0</td>
            <td th:text="${snowboard.copies.size()}">0</td>
            <td>
                <div class="d-flex gap-2">
                    <a th:href="@{/snowboard/{id}(id=${snowboard.id})}" class="btn btn-sm btn-info">Details</a>
                    <a th:href="@{/snowboard/edit/{id}(id=${snowboard.id})}" class="btn btn-sm btn-warning">Bewerken</a>
                    <form th:action="@{/snowboard/delete/{id}(id=${snowboard.id})}" method="post"
                          onsubmit="return confirm('Weet je het zeker?');">
                        <button type="submit" class="btn btn-sm btn-danger">Verwijderen</button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="mt-4">
        <a th:href="@{/snowboard/add}" class="btn btn-success">Nieuw snowboard toevoegen</a>
    </div>

    <div class="mt-3">
        <a href="/" class="btn btn-link ps-0">Terug naar de startpagina</a>
    </div>
</div>

<footer th:replace="~{fragments/general :: footer}"></footer>
</body>
</html>
