<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ski types</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav th:replace="~{fragments/general :: navbar}"></nav>

<div class="container mt-4">

<div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

<h1>Ski types</h1>

<table class="table table-striped">
    <thead>
    <tr>
        <th>Type</th>
        <th></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="type : ${types}">
        <td th:text="${type.naam}">naam</td>
        <td>
            <form th:action="@{/type/delete/{id}(id=${type.id})}" method="post">
                <button type="submit" class="btn btn-sm btn-danger">Verwijderen</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<h2>Nieuw type toevoegen</h2>
<form th:action="@{/type/save}" th:object="${type}" method="post" class="d-flex gap-2">
    <input type="text" th:field="*{naam}" placeholder="Type naam" class="form-control w-auto"/>
    <span th:if="${#fields.hasErrors('naam')}" th:errors="*{naam}" class="text-danger"></span>
    <button type="submit" class="btn btn-success">Toevoegen</button>
</form>

<a th:href="@{/ski/all}" class="btn btn-link mt-3">Terug naar overzicht</a>
<footer th:replace="~{fragments/general :: footer}"></footer>
</div>
</body>
</html>
