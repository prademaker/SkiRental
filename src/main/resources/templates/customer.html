<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/general :: header}">
    <title>Klantenbeheer</title>
</head>
<body>

<nav th:replace="~{fragments/general :: navbar}"></nav>

<div class="container mt-4">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Klantenbestand</h1>
        <button type="button" class="btn btn-primary shadow-sm"
                data-bs-toggle="modal" data-bs-target="#addCustomerModal">
            <i class="bi bi-person-plus"></i> Nieuwe klant toevoegen
        </button>
    </div>

    <div class="card shadow-sm border-0">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
            <tr>
                <th class="ps-4">Naam</th>
                <th>Email</th>
                <th>Lengte</th>
                <th>Gewicht</th>
                <th>Schoenmaat</th>
                <th class="text-end pe-4">Acties</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${customers}">
                <td class="ps-4 fw-bold" th:text="${c.firstName} + ' ' + ${c.lastName}">Naam</td>
                <td th:text="${c.email}">email</td>
                <td th:text="${c.heightCm} + ' cm'">-</td>
                <td th:text="${c.weightKg} + ' kg'">-</td>
                <td th:text="${c.shoeSize}">-</td>
                <td class="text-end pe-4">
                    <div class="d-flex justify-content-end gap-2">
                        <button type="button" class="btn btn-sm btn-warning"
                                data-bs-toggle="modal" data-bs-target="#editCustomerModal"
                                th:data-id="${c.id}" th:data-firstname="${c.firstName}"
                                th:data-lastname="${c.lastName}" th:data-email="${c.email}"
                                th:data-height="${c.heightCm}" th:data-weight="${c.weightKg}"
                                th:data-shoesize="${c.shoeSize}">Bewerken</button>

                        <form th:action="@{/customer/delete/{id}(id=${c.id})}" method="post"
                              onsubmit="return confirm('Klant verwijderen?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Verwijderen</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="addCustomerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Nieuwe Klant</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/customer/save}" th:object="${customer}" method="post">
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6 mb-3"><label class="fw-bold">Voornaam</label>
                            <input type="text" th:field="*{firstName}" class="form-control" required></div>
                        <div class="col-md-6 mb-3"><label class="fw-bold">Achternaam</label>
                            <input type="text" th:field="*{lastName}" class="form-control" required></div>
                    </div>
                    <div class="mb-3"><label class="fw-bold">Email</label>
                        <input type="email" th:field="*{email}" class="form-control"></div>
                    <div class="row">
                        <div class="col-4 mb-3"><label class="fw-bold">Lengte</label>
                            <input type="number" th:field="*{heightCm}" class="form-control" placeholder="cm"></div>
                        <div class="col-4 mb-3"><label class="fw-bold">Gewicht</label>
                            <input type="number" step="0.1" th:field="*{weightKg}"
                                   class="form-control" placeholder="kg"></div>
                        <div class="col-4 mb-3"><label class="fw-bold">Schoenmaat</label>
                            <input type="number" th:field="*{shoeSize}" class="form-control"></div>
                    </div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-primary">Klant Opslaan</button></div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="editCustomerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-warning">
                <h5 class="modal-title">Klant Bewerken</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/customer/save}" method="post">
                <input type="hidden" name="id" id="edit-id">
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6 mb-3"><label class="fw-bold">Voornaam</label>
                            <input type="text" name="firstName" id="edit-firstName" class="form-control" required></div>
                        <div class="col-md-6 mb-3"><label class="fw-bold">Achternaam</label>
                            <input type="text" name="lastName" id="edit-lastName" class="form-control" required></div>
                    </div>
                    <div class="mb-3"><label class="fw-bold">Email</label><input type="email" name="email" id="edit-email" class="form-control"></div>
                    <div class="row">
                        <div class="col-4 mb-3"><label class="fw-bold">Lengte</label>
                            <input type="number" name="heightCm" id="edit-height" class="form-control"></div>
                        <div class="col-4 mb-3"><label class="fw-bold">Gewicht</label>
                            <input type="number" step="0.1" name="weightKg" id="edit-weight" class="form-control"></div>
                        <div class="col-4 mb-3"><label class="fw-bold">Schoenmaat</label>
                            <input type="number" name="shoeSize" id="edit-shoeSize" class="form-control"></div>
                    </div>
                </div>
                <div class="modal-footer"><button type="submit"
                                                  class="btn btn-warning">Wijzigingen Opslaan</button></div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/general :: footer}"></footer>

<script>
    const editCustomerModal = document.getElementById('editCustomerModal');
    if (editCustomerModal) {
        editCustomerModal.addEventListener('show.bs.modal', function (event) {
            const button = event.relatedTarget;
            editCustomerModal.querySelector('#edit-id').value = button.getAttribute('data-id');
            editCustomerModal.querySelector('#edit-firstName').value = button.getAttribute('data-firstname');
            editCustomerModal.querySelector('#edit-lastName').value = button.getAttribute('data-lastname');
            editCustomerModal.querySelector('#edit-email').value = button.getAttribute('data-email');
            editCustomerModal.querySelector('#edit-height').value = button.getAttribute('data-height');
            editCustomerModal.querySelector('#edit-weight').value = button.getAttribute('data-weight');
            editCustomerModal.querySelector('#edit-shoeSize').value = button.getAttribute('data-shoesize');
        });
    }
</script>

</body>
</html>
